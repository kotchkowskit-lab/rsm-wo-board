
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic RSM WO Board</title>
<style>
/* --- KEEPING YOUR STYLE (condensed) --- */
body{font-family:Arial;background:#0f1117;color:#e2e8f0;padding:16px}
.board{display:flex;gap:20px}
.column{flex:1;background:#1e293b;padding:10px;border-radius:6px}
.card{background:#0f172a;padding:8px;margin-bottom:8px;border-radius:6px;cursor:grab}
.header{display:flex;gap:10px;margin-bottom:10px}
button{padding:6px 10px;border:none;border-radius:4px;cursor:pointer}
.add{background:#16a34a;color:white}
.save{background:#1d4ed8;color:white}
</style>
</head>
<body>

<h2>🧩 RSM Dynamic WO Board</h2>

<div class="header">
  <button class="add" onclick="addWO()">➕ Add WO</button>
  <button class="save" onclick="syncToFlow()">🔄 Sync Power Automate</button>
</div>

<div class="board">
  <div class="column" id="new" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>⚡ New</h3>
  </div>
  <div class="column" id="confirmed" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>✅ Confirmed</h3>
  </div>
  <div class="column" id="action" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>⚠ Needs Action</h3>
  </div>
  <div class="column" id="materials" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>📦 Materials</h3>
  </div>
</div>

<script>

let BOARD_DATA = JSON.parse(localStorage.getItem("board_data") || "[]");
let dragged = null;

function saveData(){
  localStorage.setItem("board_data", JSON.stringify(BOARD_DATA));
}

function render(){
  document.querySelectorAll(".column").forEach(col => {
    col.querySelectorAll(".card").forEach(c => c.remove());
  });

  BOARD_DATA.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.draggable = true;
    card.id = item.id;

    card.innerHTML = `
      <b>${item.wo}</b><br>
      ${item.loc}<br>
      <small>${item.vendor}</small><br>
      <button onclick="removeWO('${item.id}')">❌</button>
    `;

    card.ondragstart = drag;

    document.getElementById(item.status).appendChild(card);
  });

  saveData();
}

function addWO(){
  const wo = prompt("WO Number");
  if(!wo) return;

  BOARD_DATA.push({
    id: Date.now().toString(),
    wo,
    loc: prompt("Location"),
    vendor: prompt("Vendor"),
    status: "new"
  });

  render();
}

function removeWO(id){
  BOARD_DATA = BOARD_DATA.filter(x => x.id !== id);
  render();
}

function allowDrop(ev){ev.preventDefault();}
function drag(ev){dragged = ev.target;}

function drop(ev){
  ev.preventDefault();
  if(ev.target.classList.contains("column")){
    ev.target.appendChild(dragged);

    const id = dragged.id;
    const newStatus = ev.target.id;

    const item = BOARD_DATA.find(x => x.id === id);
    if(item){
      item.status = newStatus;
    }

    saveData();
    sendUpdateToFlow(id, newStatus);
  }
}

// ========================
// 🔗 POWER AUTOMATE HOOKS
// ========================

const FLOW_GET = "PASTE_GET_URL_HERE";
const FLOW_UPDATE = "PASTE_UPDATE_URL_HERE";

async function loadFromFlow(){
  if(!FLOW_GET.includes("http")) return;

  const res = await fetch(FLOW_GET);
  const data = await res.json();

  BOARD_DATA = data;
  render();
}

function sendUpdateToFlow(id,status){
  if(!FLOW_UPDATE.includes("http")) return;

  fetch(FLOW_UPDATE, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id,status})
  });
}

function syncToFlow(){
  alert("Sync triggered (you can expand this)");
}

// ========================
// INIT
// ========================

if(BOARD_DATA.length){
  render();
} else {
  // fallback example
  BOARD_DATA = [
    {id:"1",wo:"1847929",loc:"NJ Store",vendor:"Vendor A",status:"new"}
  ];
  render();
}

// OPTIONAL: auto-load from Power Automate
// loadFromFlow();

</script>

</body>
</html>
